# render.yaml — place in project root
# Render Blueprint: defines your backend service configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hrithik-portfolio-api
    runtime: node
    region: oregon   # or singapore, frankfurt — pick closest to your users
    plan: free
    buildCommand: npm install
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: CORS_ORIGINS
        value: "https://yourdomain.com,https://www.yourdomain.com"
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard — never in code
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "noreply@yourdomain.com"
      - key: EMAIL_TO
        value: "hrithikgh29@gmail.com"
      - key: ABUSE_ADMIN_PASSWORD
        sync: false  # set manually in Render dashboard — never in code
      - key: OPENAI_API_KEY
        sync: false  # for Whisper transcription — set in dashboard
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false  # Upstash Redis REST URL — set in Render dashboard
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false  # Upstash Redis REST token — set in Render dashboard
    autoDeploy: true
    # Free tier spins down after 15 min inactivity — first request takes ~30s.
    # Consider UptimeRobot (free) to ping /api/health every 14 min to stay warm.
    # NOTE: Free tier has an ephemeral filesystem — all persistent data (abuse log,
    # device intel, visitors) is stored in Upstash Redis. Set UPSTASH_REDIS_REST_URL
    # and UPSTASH_REDIS_REST_TOKEN in the Render dashboard before deploying.
